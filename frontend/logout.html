<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TourGIS - Logout</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Outfit', sans-serif;
      background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .logout-container {
      background: #ffffff;
      padding: 2.5rem;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
      width: 100%;
      max-width: 400px;
      text-align: center;
    }
    .logout-container h1 {
      margin: 0 0 1rem;
      color: #1e293b;
    }
    .logout-container p {
      color: #64748b;
      margin-bottom: 2rem;
    }
    .btn {
      display: inline-block;
      width: 100%;
      padding: 0.75rem;
      background: #3b82f6;
      color: white;
      text-decoration: none;
      border: none;
      border-radius: 6px;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      box-sizing: border-box;
      transition: background 0.2s;
    }
    .btn:hover {
      background: #2563eb;
    }
  </style>
</head>
<body>
  <div class="logout-container">
    <h1>Logged Out</h1>
    <p>You have been successfully logged out of TourGIS.</p>
    <a href="index.html" class="btn">Return to Map</a>
  </div>

  <script>
    // Clear the auth state immediately
    localStorage.removeItem("isLoggedIn");
    localStorage.removeItem("username");
  </script>
</body>
</html>
