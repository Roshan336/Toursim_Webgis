<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TourGIS - Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Outfit', sans-serif;
      background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .login-container {
      background: #ffffff;
      padding: 2.5rem;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
      width: 100%;
      max-width: 400px;
    }
    .login-header {
      text-align: center;
      margin-bottom: 2rem;
    }
    .login-header h1 {
      margin: 0;
      font-size: 1.5rem;
      color: #1e293b;
    }
    .login-header p {
      margin: 0.5rem 0 0;
      color: #64748b;
      font-size: 0.9rem;
    }
    .tabs {
      display: flex;
      margin-bottom: 1.5rem;
      border-bottom: 1px solid #e2e8f0;
    }
    .tab {
      flex: 1;
      text-align: center;
      padding: 0.75rem;
      cursor: pointer;
      color: #64748b;
      font-weight: 500;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
    }
    .tab.active {
      color: #3b82f6;
      border-bottom: 2px solid #3b82f6;
    }
    .form-group {
      margin-bottom: 1.5rem;
    }
    .form-group label {
      display: block;
      margin-bottom: 0.5rem;
      color: #475569;
      font-size: 0.9rem;
      font-weight: 500;
    }
    .form-group input {
      width: 100%;
      padding: 0.75rem;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      font-family: inherit;
      box-sizing: border-box;
    }
    .form-group input:focus {
      outline: none;
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
    }
    .login-btn {
      width: 100%;
      padding: 0.75rem;
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 6px;
      font-family: inherit;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    .login-btn:hover {
      background: #2563eb;
    }
    .login-btn:disabled {
      background: #94a3b8;
      cursor: not-allowed;
    }
    #error-msg, #success-msg {
      font-size: 0.85rem;
      margin-top: 0.5rem;
      display: none;
    }
    #error-msg {
      color: #ef4444;
    }
    #success-msg {
      color: #10b981;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-header">
      <h1>Welcome to TourGIS</h1>
      <p>Authentication required to access the map</p>
    </div>
    
    <div class="tabs">
      <div class="tab active" id="tab-login">Login</div>
      <div class="tab" id="tab-register">Register</div>
    </div>
    
    <div class="form-group">
      <label for="username">Username</label>
      <input type="text" id="username" placeholder="Enter your username">
    </div>
    
    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="Enter your password">
    </div>
    
    <div id="error-msg"></div>
    <div id="success-msg"></div>
    
    <button class="login-btn" id="submit-btn">Login</button>
  </div>

  <script>
    let isLoginMode = true;
    const BACKEND_URL = "http://localhost:8001";
    
    const tabLogin = document.getElementById('tab-login');
    const tabRegister = document.getElementById('tab-register');
    const submitBtn = document.getElementById('submit-btn');
    const errorMsg = document.getElementById('error-msg');
    const successMsg = document.getElementById('success-msg');
    
    function switchMode(login) {
      isLoginMode = login;
      if (login) {
        tabLogin.classList.add('active');
        tabRegister.classList.remove('active');
        submitBtn.innerText = 'Login';
      } else {
        tabLogin.classList.remove('active');
        tabRegister.classList.add('active');
        submitBtn.innerText = 'Register';
      }
      errorMsg.style.display = 'none';
      successMsg.style.display = 'none';
    }
    
    tabLogin.addEventListener('click', () => switchMode(true));
    tabRegister.addEventListener('click', () => switchMode(false));

    submitBtn.addEventListener('click', async () => {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value.trim();
      
      errorMsg.style.display = 'none';
      successMsg.style.display = 'none';
      
      if (!username || !password) {
        errorMsg.innerText = 'Please enter both username and password.';
        errorMsg.style.display = 'block';
        return;
      }
      
      submitBtn.disabled = true;
      submitBtn.innerText = 'Processing...';
      
      try {
        const endpoint = isLoginMode ? '/api/auth/login' : '/api/auth/register';
        const response = await fetch(`${BACKEND_URL}${endpoint}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        
        const data = await response.json();
        
        if (!response.ok) {
          throw new Error(data.detail || 'An error occurred');
        }
        
        if (isLoginMode) {
          localStorage.setItem("isLoggedIn", "true");
          localStorage.setItem("username", username);
          localStorage.setItem("token", data.token);
          window.location.href = "index.html";
        } else {
          successMsg.innerText = 'Registration successful! You can now login.';
          successMsg.style.display = 'block';
          switchMode(true);
        }
      } catch (err) {
        errorMsg.innerText = err.message;
        errorMsg.style.display = 'block';
      } finally {
        submitBtn.disabled = false;
        submitBtn.innerText = isLoginMode ? 'Login' : 'Register';
      }
    });
  </script>
</body>
</html>
